<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Hintergrund-Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7eb8f7"/>
      <stop offset="100%" stop-color="#3d3fa5"/>
    </linearGradient>
    <!-- Schatten-Filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.30"/>
    </filter>
  </defs>

  <!-- Hintergrund -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bgGrad)"/>

  <!-- Optional: Glanz-Overlay oben-links -->
  <ellipse cx="160" cy="140" rx="180" ry="160" fill="white" fill-opacity="0.07"/>

  <!-- Motiv: POI -->
  <g filter="url(#shadow)">
    <!-- Map Pin -->
    <path d="M 256 120 C 180 120 130 170 130 240 C 130 320 256 420 256 420 C 256 420 382 320 382 240 C 382 170 332 120 256 120 Z" fill="none" stroke="#ffffff" stroke-width="28"/>
    <!-- Star Inside -->
    <polygon points="256,180 274,225 320,225 282,252 296,298 256,270 216,298 230,252 192,225 238,225" fill="#ffffff"/>
  </g>
</svg>